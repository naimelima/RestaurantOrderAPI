version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "SuaSenha123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - appnet

  api:
    build: .
    ports:
      - "8081:80"
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=RestaurantOrderDB;User Id=sa;Password=SuaSenha123!;TrustServerCertificate=True;"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge